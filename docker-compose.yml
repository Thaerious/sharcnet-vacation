services:
  app:
    build: .
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      # Override paths to locations inside the container
      PORT: "3000"
      DB_DIR: /data/db
      SESSION_DB: /data/db/sessions.db
      EMPTY_DB_PATH: /app/db/empty.db
      LOGFILE: /data/logs/app.log
      GKEY_FILENAME: /run/secrets/gkey.json
    volumes:
      - db-data:/data/db
      - log-data:/data/logs
      # GKEY_FILENAME in .env is the host path; it's mounted to a fixed container path above
      - ${GKEY_FILENAME:-/dev/null}:/run/secrets/gkey.json:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  db-data:
  log-data:
